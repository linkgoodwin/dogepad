name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          touch .env
          echo "VITE_WALLETCONNECT_PROJECT_ID=${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}" >> .env
          echo "VITE_PINATA_JWT=${{ secrets.VITE_PINATA_JWT }}" >> .env
          echo "VITE_ARC_TESTNET_BONDING_CURVE_ADDRESS=${{ secrets.VITE_ARC_TESTNET_BONDING_CURVE_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_LAUNCH_DAO_ADDRESS=${{ secrets.VITE_ARC_TESTNET_LAUNCH_DAO_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_FACTORY_ADDRESS=${{ secrets.VITE_ARC_TESTNET_FACTORY_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_SIMPLE_FACTORY_ADDRESS=${{ secrets.VITE_ARC_TESTNET_SIMPLE_FACTORY_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_SIMPLE_ROUTER_ADDRESS=${{ secrets.VITE_ARC_TESTNET_SIMPLE_ROUTER_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_PERPETUAL_POOL_ADDRESS=${{ secrets.VITE_ARC_TESTNET_PERPETUAL_POOL_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_BUY_AND_BURN_ADDRESS=${{ secrets.VITE_ARC_TESTNET_BUY_AND_BURN_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_DEX_LISTER_ADDRESS=${{ secrets.VITE_ARC_TESTNET_DEX_LISTER_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_PRICE_ORACLE_ADDRESS=${{ secrets.VITE_ARC_TESTNET_PRICE_ORACLE_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_FEE_DISTRIBUTOR_ADDRESS=${{ secrets.VITE_ARC_TESTNET_FEE_DISTRIBUTOR_ADDRESS }}" >> .env
          echo "VITE_ARC_TESTNET_CREATOR_REWARD_MANAGER_ADDRESS=${{ secrets.VITE_ARC_TESTNET_CREATOR_REWARD_MANAGER_ADDRESS }}" >> .env

      - name: Build
        run: pnpm run build

      - name: Add 404.html for SPA routing
        run: |
          cp public/404.html dist/404.html
          cp public/CNAME dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
