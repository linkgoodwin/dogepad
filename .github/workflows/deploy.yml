name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

environment:
  name: github-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          VITE_WALLETCONNECT_PROJECT_ID=${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_CHAIN_ID=${{ secrets.VITE_CHAIN_ID }}
          VITE_BSC_TESTNET_RPC=${{ secrets.VITE_BSC_TESTNET_RPC }}
          VITE_BSC_MAINNET_RPC=${{ secrets.VITE_BSC_MAINNET_RPC }}
          VITE_PINATA_JWT=${{ secrets.VITE_PINATA_JWT }}
          VITE_TESTNET_BONDING_CURVE_ADDRESS=${{ secrets.VITE_TESTNET_BONDING_CURVE_ADDRESS }}
          VITE_TESTNET_FACTORY_ADDRESS=${{ secrets.VITE_TESTNET_FACTORY_ADDRESS }}
          VITE_TESTNET_LONG_POOL_ADDRESS=${{ secrets.VITE_TESTNET_LONG_POOL_ADDRESS }}
          VITE_TESTNET_SHORT_POOL_ADDRESS=${{ secrets.VITE_TESTNET_SHORT_POOL_ADDRESS }}
          VITE_TESTNET_BUY_AND_BURN_ADDRESS=${{ secrets.VITE_TESTNET_BUY_AND_BURN_ADDRESS }}
          VITE_TESTNET_LAUNCH_DAO_ADDRESS=${{ secrets.VITE_TESTNET_LAUNCH_DAO_ADDRESS }}
          VITE_TESTNET_PRICE_ORACLE_ADDRESS=${{ secrets.VITE_TESTNET_PRICE_ORACLE_ADDRESS }}
          VITE_TESTNET_FEE_DISTRIBUTOR_ADDRESS=${{ secrets.VITE_TESTNET_FEE_DISTRIBUTOR_ADDRESS }}
          VITE_TESTNET_CREATOR_REWARD_MANAGER_ADDRESS=${{ secrets.VITE_TESTNET_CREATOR_REWARD_MANAGER_ADDRESS }}
          VITE_MAINNET_BONDING_CURVE_ADDRESS=${{ secrets.VITE_MAINNET_BONDING_CURVE_ADDRESS }}
          VITE_MAINNET_FACTORY_ADDRESS=${{ secrets.VITE_MAINNET_FACTORY_ADDRESS }}
          VITE_MAINNET_LONG_POOL_ADDRESS=${{ secrets.VITE_MAINNET_LONG_POOL_ADDRESS }}
          VITE_MAINNET_SHORT_POOL_ADDRESS=${{ secrets.VITE_MAINNET_SHORT_POOL_ADDRESS }}
          VITE_MAINNET_BUY_AND_BURN_ADDRESS=${{ secrets.VITE_MAINNET_BUY_AND_BURN_ADDRESS }}
          VITE_MAINNET_LAUNCH_DAO_ADDRESS=${{ secrets.VITE_MAINNET_LAUNCH_DAO_ADDRESS }}
          VITE_MAINNET_PRICE_ORACLE_ADDRESS=${{ secrets.VITE_MAINNET_PRICE_ORACLE_ADDRESS }}
          VITE_MAINNET_FEE_DISTRIBUTOR_ADDRESS=${{ secrets.VITE_MAINNET_FEE_DISTRIBUTOR_ADDRESS }}
          VITE_MAINNET_CREATOR_REWARD_MANAGER_ADDRESS=${{ secrets.VITE_MAINNET_CREATOR_REWARD_MANAGER_ADDRESS }}
          EOF

      - name: Build
        run: npm run build

      - name: Add 404.html for SPA routing
        run: cp public/404.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
