<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DogePad</title>
<script>
// SPA redirect: GitHub Pages serves 404.html for non-root paths
// This script reads the path from the URL and redirects to index.html with the path as a query param
var pathSegmentsToKeep = 1; // for user/org pages; use 1 for project pages
var l = window.location;
l.replace(
  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
  l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
  l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
  l.hash
);
</script>
</head>
<body></body>
</html>
