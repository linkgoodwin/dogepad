specVersion: 0.0.5
description: BSC Launchpad - Bonding Curve Token Launch & Lending Protocol
repository: https://github.com/your-org/bsc-launchpad
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: BondingCurveFactory
    network: bsc
    source:
      address: "0xYOUR_FACTORY_ADDRESS"
      abi: BondingCurveFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
      abis:
        - name: BondingCurveFactory
          file: ./abis/BondingCurveFactory.json
        - name: BondingCurve
          file: ./abis/BondingCurve.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,string,string,address)
          handler: handleTokenCreated
      file: ./mapping.ts
templates:
  - kind: ethereum
    name: BondingCurve
    network: bsc
    source:
      abi: BondingCurve
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
      abis:
        - name: BondingCurve
          file: ./abis/BondingCurve.json
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: TokenBought(indexed address,indexed address,uint256,uint256)
          handler: handleTokenBought
        - event: TokenSold(indexed address,indexed address,uint256,uint256)
          handler: handleTokenSold
        - event: DexListed(indexed address,uint256,uint256)
          handler: handleDexListed
      file: ./mapping.ts
