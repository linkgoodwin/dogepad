version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: graph-node
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node"]
      interval: 10s
      timeout: 5s
      retries: 5

  ipfs:
    image: ipfs/kubo:latest
    restart: always
    volumes:
      - ipfs_data:/data/ipfs
    ports:
      - "5001:5001"

  graph-node:
    image: graphprotocol/graph-node:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
    environment:
      postgres_host: postgres
      postgres_port: 5432
      postgres_user: graph-node
      postgres_pass: ${POSTGRES_PASSWORD:-changeme}
      postgres_db: graph-node
      ipfs: ipfs:5001
      ethereum: bsc:https://bsc-dataseed.binance.org/
      GRAPH_LOG: info
      ETHEREUM_REORG_THRESHOLD: 1
      ETHEREUM_POLLING_INTERVAL: 1000
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"

volumes:
  postgres_data:
  ipfs_data:
